<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>De-escalation: Myth or Reality?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Compact layout styles to prevent scrolling in embeds */
        html, body {
            overflow-x: hidden;
            margin: 0;
            padding: 0;
            background-color: #f8fafc;
        }
        
        /* Hide scrollbar for all browsers */
        body::-webkit-scrollbar { display: none; }
        body { -ms-overflow-style: none; scrollbar-width: none; }

        .draggable-card {
            cursor: grab;
            transition: transform 0.2s, box-shadow 0.2s;
            touch-action: none;
            user-select: none;
        }
        .draggable-card:active { cursor: grabbing; }
        
        .drop-zone {
            border: 2px dashed #cbd5e1;
            background: #f8fafc;
            min-height: 220px;
        }
        .drop-zone.drag-over {
            border-color: #3b82f6;
            background: #eff6ff;
            box-shadow: inset 0 0 20px rgba(59, 130, 246, 0.1);
        }
        .modal-overlay {
            background-color: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(6px);
        }
        .font-main { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .shake { animation: shake 0.4s ease-in-out; }

        .touch-dragging {
            opacity: 0.9;
            pointer-events: none;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        
        .select-none { user-select: none; }
    </style>
</head>
<body class="font-main p-2 md:p-4">

    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <div class="bg-[#1e293b] text-white p-4 rounded-t-2xl text-center shadow-xl border-b border-slate-700">
            <h1 class="text-lg md:text-xl font-bold mb-1">De-escalation: Myth or Reality?</h1>
            <p class="text-slate-400 italic text-sm">Drag each statement to where it belongs.</p>
        </div>

        <!-- Main Board -->
        <div class="bg-white border-x border-b border-slate-200 rounded-b-2xl p-4 shadow-md">
            
            <!-- Active Card Area -->
            <div id="source-container" class="flex flex-col items-center mb-6">
                <div id="active-card-slot" class="w-full max-w-md h-40 flex items-center justify-center border-2 border-slate-100 rounded-2xl bg-slate-50/50 relative p-4">
                    <!-- Cards injected here -->
                </div>
                <div id="deck-counter" class="mt-2 text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                    Tiles Remaining: <span id="cards-left">6</span>
                </div>
            </div>

            <!-- Target Zones -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div id="zone-myth" class="drop-zone p-4 rounded-2xl flex flex-col items-center text-center transition-all group" ondrop="handleDrop(event, 'myth')" ondragover="allowDrop(event)" ondragleave="handleDragLeave(event)">
                    <div class="w-10 h-10 bg-red-100 text-red-600 rounded-full flex items-center justify-center mb-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                    </div>
                    <div class="text-slate-800 font-bold text-lg mb-1">Myth</div>
                    <div id="count-myth" class="px-3 py-0.5 bg-slate-200 text-slate-600 rounded-full text-[10px] font-bold uppercase">0 Items</div>
                </div>

                <div id="zone-reality" class="drop-zone p-4 rounded-2xl flex flex-col items-center text-center transition-all group" ondrop="handleDrop(event, 'reality')" ondragover="allowDrop(event)" ondragleave="handleDragLeave(event)">
                    <div class="w-10 h-10 bg-green-100 text-green-600 rounded-full flex items-center justify-center mb-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg>
                    </div>
                    <div class="text-slate-800 font-bold text-lg mb-1">Reality</div>
                    <div id="count-reality" class="px-3 py-0.5 bg-slate-200 text-slate-600 rounded-full text-[10px] font-bold uppercase">0 Items</div>
                </div>
            </div>
        </div>

        <!-- Completion UI -->
        <div id="completion-ui" class="hidden mt-4 text-center p-6 bg-white border border-slate-200 rounded-2xl shadow-xl">
            <h2 class="text-2xl font-black text-slate-800 mb-1">Activity Complete</h2>
            <p class="text-slate-600 text-sm max-w-md mx-auto mb-4">Understanding what de-escalation truly is helps you apply it effectively in high-pressure situations.</p>
            <button onclick="location.reload()" class="px-6 py-2 bg-[#1e293b] text-white font-bold rounded-xl hover:bg-slate-700 transition shadow-lg">
                Restart Exercise
            </button>
        </div>
    </div>

    <!-- Modal -->
    <div id="feedback-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay">
        <div class="bg-white rounded-3xl max-w-lg w-full shadow-2xl overflow-hidden transform transition-all select-none">
            <div class="p-8 md:p-10">
                <h3 id="modal-heading" class="text-xl font-black mb-6"></h3>
                <div id="modal-quote-box" class="bg-white border-l-4 p-5 rounded-r-xl">
                    <p id="modal-italic-text" class="text-slate-600 italic text-base leading-relaxed font-medium"></p>
                </div>
                <button onclick="closeModal()" class="mt-8 w-full py-3 bg-[#1e293b] text-white font-bold rounded-2xl hover:bg-slate-800 transition shadow-lg">
                    Next Action
                </button>
            </div>
        </div>
    </div>

    <script>
        const scenarios = [
            // Myths
            { id: 1, target: 'myth', text: "A manipulative trick to make someone calm down", feedback: "De-escalation is not about tricks. It is about creating the conditions where calm becomes possible. That is a very different thing." },
            { id: 2, target: 'myth', text: "Staying quiet and letting the patient talk themselves out", feedback: "Silence without engagement is avoidance. A patient who feels unheard will not calm down. They will escalate until someone actually listens." },
            { id: 4, target: 'myth', text: "Agreeing with the patient even when they are wrong", feedback: "You do not have to agree with someone to make them feel heard. Acknowledging how someone feels and endorsing what they say are two very different things." },
            
            // Realities
            { id: 3, target: 'reality', text: "Using active listening and setting respectful boundaries", feedback: "Listening tells the patient they are safe. Boundaries tell them where the conversation can and cannot go. Neither is passive. Both are essential." },
            { id: 5, target: 'reality', text: "Steadying a volatile situation by managing your own calm first", feedback: "This is the thermostat in action. Your calm is not just good practice. It is the foundation everything else is built on." },
            { id: 6, target: 'reality', text: "Showing a genuine interest in the patient's concern", feedback: "Genuine interest cannot be faked and patients know the difference. When someone feels you actually care, the threat response begins to ease. That is where the conversation can begin." }
        ];

        let currentDeck = [...scenarios].sort(() => Math.random() - 0.5);
        let counts = { myth: 0, reality: 0 };
        let activeCard = null;

        function renderNextCard() {
            const container = document.getElementById('active-card-slot');
            const counterLabel = document.getElementById('cards-left');
            container.innerHTML = '';
            counterLabel.innerText = currentDeck.length;
            
            if (currentDeck.length === 0) {
                container.innerHTML = '<div class="text-slate-400 font-medium">Activity Complete</div>';
                document.getElementById('deck-counter').classList.add('hidden');
                document.getElementById('completion-ui').classList.remove('hidden');
                return;
            }

            activeCard = currentDeck[0];
            const cardEl = document.createElement('div');
            cardEl.className = 'draggable-card w-full h-full bg-white shadow-xl border border-slate-200 rounded-2xl p-4 flex items-center justify-center text-center font-bold text-slate-800 text-base md:text-lg transition-all duration-300';
            cardEl.draggable = true;
            cardEl.innerText = activeCard.text;
            cardEl.id = "card-" + activeCard.id;
            
            cardEl.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('text/plain', activeCard.id);
                cardEl.classList.add('opacity-40');
            });
            
            cardEl.addEventListener('dragend', (e) => {
                cardEl.classList.remove('opacity-40');
            });

            cardEl.addEventListener('touchstart', handleTouchStart, {passive: false});
            cardEl.addEventListener('touchmove', handleTouchMove, {passive: false});
            cardEl.addEventListener('touchend', handleTouchEnd, {passive: false});

            container.appendChild(cardEl);
        }

        function allowDrop(ev) {
            ev.preventDefault();
            ev.currentTarget.classList.add('drag-over');
        }

        function handleDragLeave(ev) {
            ev.currentTarget.classList.remove('drag-over');
        }

        function handleDrop(ev, zoneType) {
            ev.preventDefault();
            ev.currentTarget.classList.remove('drag-over');
            processChoice(zoneType);
        }

        function processChoice(zoneType) {
            if (zoneType === activeCard.target) {
                counts[zoneType]++;
                document.getElementById(`count-${zoneType}`).innerText = `${counts[zoneType]} Item${counts[zoneType] > 1 ? 's' : ''}`;
                showFeedback(activeCard, zoneType);
                currentDeck.shift();
                renderNextCard();
            } else {
                const slot = document.getElementById('active-card-slot');
                slot.classList.add('shake');
                setTimeout(() => slot.classList.remove('shake'), 400);
            }
        }

        function showFeedback(card, zoneType) {
            const heading = document.getElementById('modal-heading');
            const quoteBox = document.getElementById('modal-quote-box');
            document.getElementById('modal-italic-text').innerText = `"${card.feedback}"`;
            
            if (zoneType === 'reality') {
                heading.innerText = "Reality";
                heading.className = "text-xl font-black mb-6 text-green-600";
                quoteBox.className = "bg-white border-l-4 border-green-500 p-5 rounded-r-xl";
            } else {
                heading.innerText = "Myth";
                heading.className = "text-xl font-black mb-6 text-red-600";
                quoteBox.className = "bg-white border-l-4 border-red-500 p-5 rounded-r-xl";
            }
            document.getElementById('feedback-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('feedback-modal').classList.add('hidden');
        }

        let touchStartX, touchStartY;
        function handleTouchStart(e) {
            const touch = e.touches[0];
            touchStartX = touch.clientX;
            touchStartY = touch.clientY;
            e.currentTarget.classList.add('touch-dragging');
        }
        function handleTouchMove(e) {
            e.preventDefault();
            const touch = e.touches[0];
            const card = e.currentTarget;
            card.style.position = 'fixed';
            card.style.width = '80vw';
            card.style.maxWidth = '300px';
            card.style.left = (touch.clientX - (parseInt(card.style.width)/2 || 150)) + 'px';
            card.style.top = (touch.clientY - 40) + 'px';
            card.style.zIndex = 1000;
        }
        function handleTouchEnd(e) {
            const card = e.currentTarget;
            const touch = e.changedTouches[0];
            const zones = ['myth', 'reality'];
            let dropped = false;
            
            card.classList.remove('touch-dragging');
            card.style.position = 'static';
            card.style.zIndex = 1;
            card.style.width = '100%';
            
            for(let z of zones) {
                const rect = document.getElementById(`zone-${z}`).getBoundingClientRect();
                if (touch.clientX > rect.left && touch.clientX < rect.right && touch.clientY > rect.top && touch.clientY < rect.bottom) {
                    processChoice(z);
                    dropped = true;
                    break;
                }
            }
            if (!dropped) renderNextCard(); 
        }

        window.onload = renderNextCard;
    </script>
</body>
</html>
